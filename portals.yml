# Portal Scanner Configuration — Business Analyst / Scrum Master
# Customized for BA, Scrum Master, and Product-adjacent roles.
# Focus: Remote + DC/MD/VA metro area.

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- BA / Analyst roles --
    - "Business Analyst"
    - "Senior Business Analyst"
    - "Business Systems Analyst"
    - "Systems Analyst"
    - "Requirements Analyst"
    - "Process Analyst"
    - "IT Business Analyst"
    - "ERP Analyst"
    - "Data Analyst"
    - "Operations Analyst"
    # -- Scrum / Agile roles --
    - "Scrum Master"
    - "Agile Coach"
    - "Agile Lead"
    - "Delivery Lead"
    - "Release Train Engineer"
    # -- Product-adjacent roles --
    - "Product Owner"
    - "Product Manager"
    - "Technical Product Manager"
    - "Program Analyst"
    # -- Process & transformation --
    - "Process Improvement"
    - "Business Process"
    - "Transformation"
    - "Change Management"
    - "Business Intelligence"
  negative:
    - "Intern"
    - "Internship"
    - "Co-Op"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "Salesforce Admin"
    - "Graphic Designer"
    - "Content Writer"
    - "Marketing Analyst"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Staff"
    - "Manager"
    - "Director"

# -- Search queries --
# Each query triggers a WebSearch. Targeted at major job portals.

search_queries:

  # -- Ashby --
  - name: Ashby — Business Analyst
    query: 'site:jobs.ashbyhq.com "Business Analyst" OR "Senior Business Analyst" remote'
    enabled: true

  - name: Ashby — Scrum Master
    query: 'site:jobs.ashbyhq.com "Scrum Master" OR "Agile Coach" OR "Delivery Lead" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Business Analyst
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Business Analyst" OR "Systems Analyst" remote'
    enabled: true

  - name: Greenhouse — Scrum & Agile
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Scrum Master" OR "Agile Coach" OR "Product Owner" remote'
    enabled: true

  - name: Greenhouse — Process & ERP
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Business Process" OR "ERP Analyst" OR "Business Systems Analyst" remote'
    enabled: true

  # -- Lever --
  - name: Lever — BA & Scrum
    query: 'site:jobs.lever.co "Business Analyst" OR "Scrum Master" OR "Product Owner" remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — BA & Product
    query: 'site:wellfound.com "Business Analyst" OR "Product Owner" OR "Scrum Master" remote'
    enabled: true

  # -- Workable --
  - name: Workable — BA Roles
    query: 'site:apply.workable.com "Business Analyst" OR "Scrum Master" OR "Agile" remote'
    enabled: true

  # -- Government / Public Sector --
  - name: USAJobs — BA & Program Analyst
    query: 'site:usajobs.gov "Business Analyst" OR "Program Analyst" OR "IT Specialist" Maryland OR Washington OR remote'
    enabled: true

  - name: Government Contractor — BA
    query: '"Business Analyst" OR "Scrum Master" "clearance" OR "public trust" Maryland OR Virginia OR "Washington DC" OR remote'
    enabled: true

  # -- Major job boards (broader discovery) --
  - name: LinkedIn — BA DMV Area
    query: 'site:linkedin.com/jobs "Business Analyst" OR "Scrum Master" Maryland OR Virginia OR "Washington DC" OR remote'
    enabled: true

  - name: Indeed — BA Remote
    query: 'site:indeed.com "Senior Business Analyst" OR "Scrum Master" remote'
    enabled: true

